<section class="eco" id="innovation-ecosystem">

  <!-- ═══ SECTION HEADER ═══ -->
  <div class="eco__header">
    <div class="eco__header-num">03</div>
    <h2 class="eco__header-label">{{ 'ecosystem.title' | translate }}</h2>
    <h3 class="eco__header-title">THE INNOVATION GALAXY</h3>
    <p class="eco__header-desc">{{ 'ecosystem.desc' | translate }}</p>
  </div>

  <div class="eco__canvas-wrap">

    <svg class="eco__svg" viewBox="0 0 900 900" preserveAspectRatio="xMidYMid meet"
         role="img" aria-label="M Tech Square Group interactive ecosystem diagram">
      <title>Ecosystem Visualization</title>

      <defs>
        <radialGradient id="ecoSphereGrad" cx="35%" cy="28%" r="70%" fx="35%" fy="28%">
          <stop offset="0%"   stop-color="#f7e3ad"/>
          <stop offset="18%"  stop-color="#dbb75c"/>
          <stop offset="40%"  stop-color="#b08530"/>
          <stop offset="65%"  stop-color="#7d5c1e"/>
          <stop offset="85%"  stop-color="#503a10"/>
          <stop offset="100%" stop-color="#3a2a0b"/>
        </radialGradient>

        <radialGradient id="ecoCenterGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#f7e3ad"/>
          <stop offset="25%"  stop-color="#D5B182"/>
          <stop offset="55%"  stop-color="#7d5c1e"/>
          <stop offset="100%" stop-color="#3a2a0b"/>
        </radialGradient>

        <filter id="ecoGlow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <filter id="ecoCenterGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
        </filter>

        <linearGradient id="ecoPathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#D5B182"/>
          <stop offset="50%"  stop-color="#1DD4BF"/>
          <stop offset="100%" stop-color="#D5B182"/>
        </linearGradient>

        <radialGradient id="ecoPlanetAura" cx="50%" cy="50%" r="50%">
          <stop offset="60%"  stop-color="rgba(213,177,130,0)"/>
          <stop offset="100%" stop-color="rgba(213,177,130,0.12)"/>
        </radialGradient>
      </defs>


      <!-- ═══ BACKGROUND STARS ═══ -->
      <g class="eco__stars" aria-hidden="true">
        <circle *ngFor="let s of (responsiveStars$ | async)"
          [attr.cx]="s.cx" [attr.cy]="s.cy" [attr.r]="s.r"
          fill="white" [attr.opacity]="s.opacity"
          [style.animation-duration]="(3 + s.delay) + 's'"
          [style.animation-delay]="s.delay + 's'"/>
      </g>


      <!-- ═══ CONNECTION PATHS ═══ -->
      <g class="eco__connections" aria-hidden="true">
        <path *ngFor="let path of connectionPaths; let i = index"
          class="eco__path"
          [class.eco__path--center]="path.type === 'center'"
          [class.eco__path--inter]="path.type === 'inter'"
          [attr.d]="path.d"
          fill="none"
          [attr.stroke]="path.type === 'center' ? 'url(#ecoPathGrad)' : 'rgba(29, 212, 191, 0.25)'"
          [attr.stroke-width]="path.type === 'center' ? '1.5' : '0.8'"
          stroke-dasharray="12 8"
          stroke-linecap="round"/>
      </g>


      <!-- ═══ CENTRAL HUB ═══ -->
      <g class="eco__center">
        <circle class="eco__center-pulse" cx="450" cy="450" r="95"
          fill="none" stroke="rgba(213, 177, 130, 0.15)" stroke-width="2"
          filter="url(#ecoCenterGlow)"/>

        <circle cx="450" cy="450" r="70" fill="url(#ecoCenterGrad)" filter="url(#ecoGlow)"/>
        <circle cx="450" cy="450" r="71" fill="none"
          stroke="rgba(213, 177, 130, 0.5)" stroke-width="1.5"/>

        <text x="450" y="435" text-anchor="middle" class="eco__center-text eco__center-text--main">M TECH</text>
        <text x="450" y="458" text-anchor="middle" class="eco__center-text eco__center-text--sub">SQUARE</text>
        <text x="450" y="478" text-anchor="middle" class="eco__center-text eco__center-text--label">GROUP</text>
      </g>


      <!-- ═══ SUBSIDIARY PLANETS ═══ -->
      <g *ngFor="let pillar of brandsPillars"
         class="eco__planet"
         tabindex="0"
         role="button"
         [attr.aria-label]="'Explore ' + (pillar.nameKey1 | translate) + ' ' + (pillar.nameKey2 | translate)"
         [class.eco__planet--active]="(hoveredPillar$ | async)?.id === pillar.id"
         (mouseenter)="onPillarHover(pillar)"
         (mouseleave)="onPillarHover(null)"
         (click)="onPillarClick(pillar)"
         (keydown.enter)="onPillarClick(pillar)"
         (keydown.space)="onPillarClick(pillar); $event.preventDefault()">

        <circle [attr.cx]="pillar.cx" [attr.cy]="pillar.cy" r="80"
          fill="url(#ecoPlanetAura)"/>

        <circle class="eco__planet-sphere"
          [attr.cx]="pillar.cx" [attr.cy]="pillar.cy" r="60"
          fill="url(#ecoSphereGrad)"/>

        <circle [attr.cx]="pillar.cx" [attr.cy]="pillar.cy" r="61"
          fill="none" stroke="rgba(213, 177, 130, 0.35)" stroke-width="1.5"/>

        <text [attr.x]="pillar.cx" [attr.y]="pillar.cy - 12"
          text-anchor="middle" class="eco__planet-name">{{ pillar.nameKey1 | translate }}</text>
        <text [attr.x]="pillar.cx" [attr.y]="pillar.cy + 10"
          text-anchor="middle" class="eco__planet-name">{{ pillar.nameKey2 | translate }}</text>
        <text [attr.x]="pillar.cx" [attr.y]="pillar.cy + 28"
          text-anchor="middle" class="eco__planet-subtitle">{{ pillar.subtitleKey | translate }}</text>
      </g>

    </svg>


  </div>

</section>
